// DESKTOP ICONS
// ============================================================
const desktopIcons = [
  { label: 'File Manager', icon: '📁', app: 'filemanager',  x: 20,  y: 20  },
  { label: 'Text Editor',  icon: '📝', app: 'texteditor',   x: 20,  y: 120 },
  { label: 'Terminal',     icon: '⌨️',  app: 'terminal',     x: 20,  y: 220 },
  { label: 'Calculator',   icon: '🧮', beep: '/Apps/calculator.beep', x: 20,  y: 320 },
  { label: 'Browser',      icon: '🌐', beep: '/Apps/browser.beep',    x: 20,  y: 420 },
  { label: 'Settings',     icon: '⚙️',  app: 'settings',     x: 110, y: 20  },
  { label: 'About',        icon: 'ℹ️',  beep: '/Apps/about.beep',     x: 110, y: 120 },
  { label: 'Paint',        icon: '🎨', beep: '/Apps/paint.beep',      x: 110, y: 220 },
];

// Track which icon is being dragged
OS._draggingIcon = null;

function addDynamicDesktopIcon(ic) {
  const el = document.createElement('div');
  el.className = 'desktop-icon';
  el.style.left = ic.x + 'px';
  el.style.top  = ic.y + 'px';
  el.innerHTML = '<span class="icon-img">' + ic.icon + '</span><span class="icon-label">' + ic.label + '</span>';

  function launch() {
    if (ic.beep) {
      const node = OS.fs.resolve(ic.beep);
      if (node) launchBeep(node.content, ic.beep);
    } else if (ic.fspath) {
      openFileWith(ic.fspath, ic.label);
    } else if (ic.app) {
      openApp(ic.app);
    }
  }

  el.ondblclick = launch;

  el.onclick = (e) => {
    document.querySelectorAll('.desktop-icon').forEach(d => d.classList.remove('selected'));
    el.classList.add('selected');
    e.stopPropagation();
  };

  el.addEventListener('contextmenu', e => {
    e.preventDefault();
    e.stopPropagation();
    document.querySelectorAll('.desktop-icon').forEach(d => d.classList.remove('selected'));
    el.classList.add('selected');

    const items = [
      { label: '📂 Open', action: launch },
    ];

    // Rename/delete only for user-created FS items, not built-in app shortcuts
    if (ic.fspath) {
      items.push('sep');
      items.push({ label: '✏️ Rename', action: () => {
        const nn = prompt('New name:', ic.label);
        if (!nn || nn === ic.label) return;
        OS.fs.rename(ic.fspath, nn);
        ic.fspath = ic.fspath.replace(/[^/]+$/, nn);
        ic.label = nn;
        el.querySelector('.icon-label').textContent = nn;
      }});
      items.push({ label: '🗑️ Delete', action: () => {
        if (!confirm('Delete "' + ic.label + '"?')) return;
        OS.fs.rm(ic.fspath);
        el.remove();
      }});
    } else if (ic.beep) {
      // beep app shortcuts get open + open with editor
      items.push('sep');
      items.push({ label: '📝 Edit .beep file', action: () => {
        const node = OS.fs.resolve(ic.beep);
        if (node) openApp('texteditor', { title: ic.label, mount: (c, wid) => mountTextEditor(c, wid, { path: ic.beep, content: node.content, name: ic.label }) });
      }});
    }

    items.push('sep');
    items.push({ label: '📌 Properties', action: () => {
      const info = ic.fspath ? OS.fs.resolve(ic.fspath) : null;
      alert((ic.label) + '\nType: ' + (ic.app ? 'System App' : ic.beep ? '.beep App' : info?.type || 'file') + (ic.fspath ? '\nPath: ' + ic.fspath : ''));
    }});

    showCtxMenu(e.clientX, e.clientY, items);
  });

  // Mouse drag (existing — for moving icon position + dropping onto desktop folders)
  let sx, sy, sl, st, didDrag = false;
  el.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    didDrag = false;
    sx = e.clientX; sy = e.clientY;
    sl = parseInt(el.style.left)||0; st = parseInt(el.style.top)||0;

    const onMove = e2 => {
      const dx = e2.clientX - sx, dy = e2.clientY - sy;
      if (!didDrag && Math.abs(dx) < 4 && Math.abs(dy) < 4) return;
      didDrag = true;
      el.style.left = Math.max(0, sl + dx) + 'px';
      el.style.top  = Math.max(0, st + dy) + 'px';
      el.style.opacity = '0.7';
      OS._draggingIcon = { ic, el };

      // Highlight folder under cursor
      document.querySelectorAll('.desktop-icon').forEach(other => {
        if (other === el) return;
        const r = other.getBoundingClientRect();
        const over = e2.clientX >= r.left && e2.clientX <= r.right && e2.clientY >= r.top && e2.clientY <= r.bottom;
        const otherIc = other._ic;
        const isFolder = otherIc && otherIc.fspath && OS.fs.resolve(otherIc.fspath)?.type === 'dir';
        other.style.outline = (over && isFolder) ? '2px solid var(--accent)' : '';
        other.style.background = (over && isFolder) ? 'rgba(0,120,212,0.25)' : '';
      });
    };

    const onUp = e2 => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      el.style.opacity = '';
      OS._draggingIcon = null;

      // Check if dropped onto a desktop folder icon
      if (didDrag) {
        document.querySelectorAll('.desktop-icon').forEach(other => {
          other.style.outline = '';
          other.style.background = '';
          if (other === el) return;
          const r = other.getBoundingClientRect();
          const over = e2.clientX >= r.left && e2.clientX <= r.right && e2.clientY >= r.top && e2.clientY <= r.bottom;
          if (!over) return;
          const otherIc = other._ic;
          if (!otherIc || !otherIc.fspath) return;
          const targetNode = OS.fs.resolve(otherIc.fspath);
          if (!targetNode || targetNode.type !== 'dir') return;
          if (!ic.fspath && !ic.beep) return;
          const srcPath = ic.fspath || ic.beep;
          const filename = srcPath.split('/').pop();
          const destPath = otherIc.fspath.replace(/\/$/, '') + '/' + filename;
          const srcNode = OS.fs.resolve(srcPath);
          if (!srcNode) return;
          if (srcNode.type === 'file') OS.fs.touch(destPath, srcNode.content);
          else OS.fs.mkdir(destPath);
          OS.fs.rm(srcPath);
          if (ic.fspath) ic.fspath = destPath;
          if (ic.beep) ic.beep = destPath;
          el.remove();
          BOS.notify('Moved "' + filename + '" into "' + otherIc.label + '"');
        });
      }
    };

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  // HTML5 drag — so File Manager can receive desktop icons as drop targets
  el.draggable = true;
  el.addEventListener('dragstart', e => {
    const srcPath = ic.fspath || ic.beep || null;
    if (!srcPath) { e.preventDefault(); return; }
    e.dataTransfer.setData('application/bos-path', srcPath);
    e.dataTransfer.setData('application/bos-source', 'desktop');
    e.dataTransfer.effectAllowed = 'move';
    el.style.opacity = '0.5';
  });
  el.addEventListener('dragend', () => { el.style.opacity = ''; });

  el._ic = ic; // store ref for DnD target detection
  document.getElementById('desktop').appendChild(el);
  return el;
}

desktopIcons.forEach(ic => addDynamicDesktopIcon(ic));

// Desktop as drop target — receive files dragged from File Manager
const desktopEl = document.getElementById('desktop');
desktopEl.addEventListener('dragover', e => {
  if (!e.dataTransfer.types.includes('application/bos-path')) return;
  if (e.target.closest('.window') || e.target.closest('.desktop-icon')) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  desktopEl.style.outline = '2px dashed var(--accent)';
});
desktopEl.addEventListener('dragleave', e => {
  if (!e.relatedTarget || !desktopEl.contains(e.relatedTarget)) {
    desktopEl.style.outline = '';
  }
});
desktopEl.addEventListener('drop', e => {
  desktopEl.style.outline = '';
  if (!e.dataTransfer.types.includes('application/bos-path')) return;
  if (e.target.closest('.window')) return;
  e.preventDefault();
  const srcPath = e.dataTransfer.getData('application/bos-path');
  const source  = e.dataTransfer.getData('application/bos-source'); // 'desktop' or 'filemanager'
  if (!srcPath) return;
  const filename = srcPath.split('/').pop();
  const destPath = '/Desktop/' + filename;
  if (srcPath === destPath) return; // already on desktop
  const srcNode = OS.fs.resolve(srcPath);
  if (!srcNode) return;
  // Move into /Desktop/
  if (srcNode.type === 'file') OS.fs.touch(destPath, srcNode.content);
  else OS.fs.mkdir(destPath);
  OS.fs.rm(srcPath);
  // Add icon at drop position
  const icon = srcNode.type === 'dir' ? '📁' : getFileIcon(filename);
  addDynamicDesktopIcon({ label: filename, icon, fspath: destPath, x: e.clientX - 38, y: e.clientY - 20 });
  BOS.notify('Moved "' + filename + '" to Desktop');
});

// Restore any files/folders the user created in /Desktop/ across sessions
(function restoreDesktopFiles() {
  const items = OS.fs.ls('/Desktop') || [];
  // Place icons in a grid starting to the right of the built-in icons
  let col = 0, row = 0;
  const startX = 210, startY = 20, stepY = 100, stepX = 90;
  items.forEach(item => {
    const fspath = '/Desktop/' + item.name;
    const icon = item.type === 'dir' ? '📁' : getFileIcon(item.name);
    addDynamicDesktopIcon({
      label: item.name,
      icon,
      fspath,
      x: startX + col * stepX,
      y: startY + row * stepY,
    });
    row++;
    if (startY + row * stepY > window.innerHeight - 150) { row = 0; col++; }
  });
})();

document.getElementById('desktop').addEventListener('click', e => {
  if (!e.target.closest('.desktop-icon')) {
    document.querySelectorAll('.desktop-icon').forEach(d => d.classList.remove('selected'));
  }
});

// ============================================================
// CLOCK
// ============================================================
function updateClock() {
  const now = new Date();
  const t = now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  const d = now.toLocaleDateString([], {month:'short',day:'numeric'});
  document.getElementById('clock').innerHTML = `${t}<br><span style="font-size:10px">${d}</span>`;
}
updateClock();
setInterval(updateClock, 1000);

// ============================================================
// LOAD SAVED SETTINGS
// ============================================================
(function loadSettings() {
  const saved = localStorage.getItem('bos_settings');
  if (!saved) return;
  try {
    const s = JSON.parse(saved);
    Object.assign(OS.settings, s);
    if (s.accent) document.documentElement.style.setProperty('--accent', s.accent);
    if (s.wallpaper) document.body.style.background = s.wallpaper;
    if (s.font) { document.documentElement.style.setProperty('--font', s.font); document.body.style.fontFamily = s.font; }
    if (!s.showClock) document.getElementById('clock').style.display = 'none';
    if (!s.transparency) document.getElementById('taskbar').style.backdropFilter = 'none';
    if (!s.darkMode) {
      document.documentElement.style.setProperty('--win-bg', '#f0f0f5');
      document.documentElement.style.setProperty('--text', '#111');
      document.documentElement.style.setProperty('--win-titlebar', '#e0e0f0');
      document.documentElement.style.setProperty('--sidebar-bg', '#d8d8ec');
      document.documentElement.style.setProperty('--hover', '#c8c8e8');
    }
  } catch(e){}
})();

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'F1') openApp('filemanager');
  if (e.ctrlKey && e.key === 'F2') openApp('terminal');
  if (e.ctrlKey && e.key === 'F3') openApp('texteditor');
  if (e.key === 'Escape') {
    hideCtxMenu();
    toggleStart(false);
  }
  // Alt+F4 close active window
  if (e.altKey && e.key === 'F4' && OS.activeWin) {
    closeWindow(OS.activeWin);
    e.preventDefault();
  }
});
